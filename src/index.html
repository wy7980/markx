<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkEdit</title>
  <link rel="stylesheet" href="https://unpkg.com/vditor@3.10.4/dist/index.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">M</div>
          <span>MarkEdit</span>
        </div>
      </div>
      <div class="file-list" id="fileList">
        <!-- 文件列表动态生成 -->
      </div>
      <div class="sidebar-footer">
        <button class="btn-new" id="btnNew">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新建文档
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Toolbar -->
      <div class="toolbar">
        <button class="toolbar-btn" id="btnToggleSidebar" title="切换侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>

        <div class="toolbar-divider"></div>

        <button class="toolbar-btn" id="btnOpen" title="打开文件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
        <button class="toolbar-btn" id="btnSave" title="保存 (Ctrl+S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
        </button>
        <button class="toolbar-btn" id="btnExport" title="导出">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>

        <div class="toolbar-divider"></div>

        <select class="toolbar-select" id="selectMode" title="编辑模式">
          <option value="code">源码</option>
          <option value="read">阅读</option>
          <option value="wysiwyg">所见即所得</option>
        </select>

        <div class="toolbar-spacer"></div>

        <div class="toolbar-group">
          <button class="toolbar-btn" id="btnOutline" title="大纲">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <circle cx="4" cy="6" r="1"></circle>
              <circle cx="4" cy="12" r="1"></circle>
              <circle cx="4" cy="18" r="1"></circle>
            </svg>
          </button>
          <button class="theme-toggle" id="btnTheme" title="切换主题">
            <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Editor Container -->
      <div class="editor-container">
        <div class="editor-wrapper">
          <div id="vditor-container"></div>
        </div>

        <!-- Outline Panel (保留DOM结构，但通过CSS隐藏) -->
        <div class="outline" id="outline" style="display: none;">
          <div class="outline-header">
            <span class="outline-title">📑 大纲</span>
            <button class="outline-collapse" id="btnCollapseAll">折叠</button>
          </div>
          <div class="outline-list" id="outlineList">
            <!-- 大纲动态生成 -->
          </div>
          <div class="outline-stats" id="outlineStats">
            <span>字数: <strong id="wordCount">0</strong></span>
            <span>段落: <strong id="paraCount">0</strong></span>
          </div>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span id="statusText">就绪</span>
        <span id="filePath">未保存</span>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/vditor@3.10.9/dist/index.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>

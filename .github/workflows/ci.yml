name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行单元测试
        run: npm run test -- --run

      - name: 运行测试覆盖率
        run: npm run test:coverage

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-windows:
    name: 构建 Windows 版本
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: 上传 MSI 安装包
        uses: actions/upload-artifact@v4
        with:
          name: markx-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30

      - name: 上传 NSIS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: markx-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: 创建绿色版
        shell: bash
        run: |
          # 创建绿色版目录
          mkdir -p portable/MarkEdit
          
          # 复制可执行文件
          cp src-tauri/target/x86_64-pc-windows-msvc/release/markedit.exe portable/MarkEdit/
          
          # 创建配置目录
          mkdir -p portable/MarkEdit/data
          
          # 创建说明文件
          cat > portable/MarkEdit/README.txt << 'EOF'
          MarkEdit - 轻量级 Markdown 编辑器

          使用方法：
          1. 双击 MarkEdit.exe 运行
          2. 数据保存在 data 目录中
          3. 可随意移动整个文件夹

          官网：https://github.com/wy7980/markx
          EOF

      - name: 打包绿色版
        shell: bash
        run: |
          cd portable
          7z a -tzip ../markx-portable-win64.zip MarkEdit

      - name: 上传绿色版
        uses: actions/upload-artifact@v4
        with:
          name: markx-portable
          path: markx-portable-win64.zip
          retention-days: 30

  release:
    name: 发布
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 显示产物
        run: ls -R artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/markx-msi/*.msi
            artifacts/markx-nsis/*.exe
            artifacts/markx-portable/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

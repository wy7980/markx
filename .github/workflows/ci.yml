name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 启用 corepack
        run: corepack enable

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行单元测试
        run: npm run test -- --run

      - name: 运行测试覆盖率
        run: npm run test:coverage

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-windows:
    name: 构建 Windows 版本
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 启用 corepack
        run: corepack enable

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: 上传 MSI 安装包
        uses: actions/upload-artifact@v4
        with:
          name: markx-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30

      - name: 上传 NSIS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: markx-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: 创建绿色版
        shell: bash
        run: |
          # 创建绿色版目录
          mkdir -p portable/MarkEdit
          
          # 复制可执行文件
          cp src-tauri/target/x86_64-pc-windows-msvc/release/markedit.exe portable/MarkEdit/
          
          # 创建配置目录
          mkdir -p portable/MarkEdit/data
          
          # 创建说明文件
          cat > portable/MarkEdit/README.txt << 'EOF'
          MarkEdit - 轻量级 Markdown 编辑器

          使用方法：
          1. 双击 MarkEdit.exe 运行
          2. 数据保存在 data 目录中
          3. 可随意移动整个文件夹

          官网：https://github.com/wy7980/markx
          EOF

      - name: 打包绿色版
        shell: bash
        run: |
          cd portable
          7z a -tzip ../markx-portable-win64.zip MarkEdit

      - name: 上传绿色版
        uses: actions/upload-artifact@v4
        with:
          name: markx-portable
          path: markx-portable-win64.zip
          retention-days: 30

  build-macos:
    name: 构建 macOS 版本 (Apple Silicon)
    runs-on: macos-14  # Apple Silicon M1
    needs: test
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 启用 corepack
        run: corepack enable

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: 缓存 Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 安装证书（如配置了签名）
        if: env.APPLE_CERTIFICATE != ''
        run: |
          # 创建临时钥匙串
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          
          # 导入证书
          echo "${APPLE_CERTIFICATE}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          
          # 信任证书
          security verify-cert -c certificate.p12
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: 构建 Tauri 应用 (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 代码签名配置（可选）
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 公证配置（可选）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin

      - name: 公证应用（如配置了 Apple ID）
        if: env.APPLE_ID != ''
        run: |
          # 公证 DMG 文件
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          done
          
          # 附加公证票据
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun stapler staple "$dmg"
          done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: 上传 DMG
        uses: actions/upload-artifact@v4
        with:
          name: markx-macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: 上传 APP
        uses: actions/upload-artifact@v4
        with:
          name: markx-macos-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 30

  release:
    name: 发布
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 显示产物
        run: ls -R artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/markx-msi/*.msi
            artifacts/markx-nsis/*.exe
            artifacts/markx-portable/*.zip
            artifacts/markx-macos-dmg/*.dmg
            artifacts/markx-macos-app/*.app
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

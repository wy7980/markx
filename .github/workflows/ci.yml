name: CI Standard (based on Vite/Vue)

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.23.0'

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行单元测试
        run: pnpm run test -- --run

      - name: 运行测试覆盖率
        run: pnpm run test:coverage

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-windows:
    name: 构建 Windows 版本
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        run: pnpm run build
        shell: bash

      - name: 验证前端构建
        run: ls -la dist/
        shell: bash

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc
          tauriScript: pnpm tauri

      - name: 上传 MSI 安装包
        uses: actions/upload-artifact@v4
        with:
          name: markx-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30

      - name: 上传 NSIS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: markx-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: 创建绿色版
        shell: bash
        run: |
          mkdir -p portable/MarkEdit
          cp src-tauri/target/x86_64-pc-windows-msvc/release/markedit.exe portable/MarkEdit/
          mkdir -p portable/MarkEdit/data
          cat > portable/MarkEdit/README.txt << 'EOF'
          MarkEdit - 轻量级 Markdown 编辑器
          使用方法：
          1. 双击 MarkEdit.exe 运行
          2. 数据保存在 data 目录中
          3. 可随意移动整个文件夹
          官网：https://github.com/wy7980/markx
          EOF

      - name: 打包绿色版
        shell: bash
        run: |
          cd portable
          7z a -tzip ../markx-portable-win64.zip MarkEdit

      - name: 上传绿色版
        uses: actions/upload-artifact@v4
        with:
          name: markx-portable
          path: markx-portable-win64.zip
          retention-days: 30

  build-macos:
    name: 构建 macOS 版本
    runs-on: macos-14
    needs: test
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: 生成 Cargo.lock
        run: |
          cd src-tauri
          cargo generate-lockfile 2>/dev/null || echo "Cargo.lock 已存在"

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        run: pnpm run build

      - name: 验证前端构建
        run: ls -la dist/

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin --bundles dmg --bundles app
          tauriScript: pnpm tauri

      - name: 上传 DMG
        uses: actions/upload-artifact@v4
        with:
          name: markx-macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: 上传 APP
        uses: actions/upload-artifact@v4
        with:
          name: markx-macos-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 30

  release:
    name: 发布
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 显示产物
        run: ls -R artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/markx-msi/*.msi
            artifacts/markx-nsis/*.exe
            artifacts/markx-portable/*.zip
            artifacts/markx-macos-dmg/*.dmg
            artifacts/markx-macos-app/*.app
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

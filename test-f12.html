<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F12功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
        .test-area {
            border: 2px solid #ccc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }
        .instruction {
            background: #f0f8ff;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .result {
            background: #f0fff0;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>🔍 F12功能测试</h1>
    
    <div class="instruction">
        <h2>测试步骤:</h2>
        <ol>
            <li>按 <strong>F12</strong> 键</li>
            <li>按 <strong>Ctrl+Shift+I</strong> (Windows/Linux)</li>
            <li>按 <strong>Ctrl+Shift+J</strong> (直接打开Console)</li>
            <li>在下方测试区域<strong>右键点击</strong></li>
        </ol>
    </div>
    
    <div class="test-area" id="testArea">
        <h3>测试区域 (在这里右键点击)</h3>
        <p>这是一个测试区域，用于测试右键菜单和快捷键。</p>
        <p>请尝试各种操作，然后查看控制台输出。</p>
    </div>
    
    <div class="result">
        <h3>测试结果:</h3>
        <div id="result"></div>
    </div>
    
    <div>
        <button onclick="runTest()">运行测试</button>
        <button onclick="clearResults()">清除结果</button>
        <button onclick="checkTauri()">检查Tauri环境</button>
    </div>
    
    <script>
        const resultDiv = document.getElementById('result');
        
        function log(message) {
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            resultDiv.appendChild(p);
            console.log(message);
        }
        
        function clearResults() {
            resultDiv.innerHTML = '';
            log('结果已清除');
        }
        
        function checkTauri() {
            log('=== Tauri环境检查 ===');
            log(`User Agent: ${navigator.userAgent}`);
            log(`平台: ${navigator.platform}`);
            log(`window.__TAURI__: ${!!window.__TAURI__}`);
            log(`window.__TAURI_INTERNALS__: ${!!window.__TAURI_INTERNALS__}`);
            log(`window.__TAURI_METADATA__: ${!!window.__TAURI_METADATA__}`);
            
            if (window.__TAURI__) {
                log('✅ 检测到Tauri环境');
                const apis = Object.keys(window.__TAURI__);
                log(`可用API: ${apis.join(', ')}`);
            } else {
                log('❌ 未检测到Tauri环境 (可能是Web版本)');
            }
        }
        
        function runTest() {
            clearResults();
            log('开始F12功能测试...');
            log('请按F12、Ctrl+Shift+I、Ctrl+Shift+J键测试');
            log('或在测试区域右键点击');
        }
        
        // 键盘事件监听
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12') {
                log('🎯 F12键被按下');
                log(`  Ctrl: ${e.ctrlKey}, Shift: ${e.shiftKey}, Alt: ${e.altKey}, Meta: ${e.metaKey}`);
            }
            
            if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                log('🎯 Ctrl+Shift+I被按下');
            }
            
            if (e.ctrlKey && e.shiftKey && e.key === 'J') {
                log('🎯 Ctrl+Shift+J被按下');
            }
        });
        
        // 右键菜单事件
        document.getElementById('testArea').addEventListener('contextmenu', (e) => {
            log('🖱️ 测试区域右键点击');
            e.preventDefault(); // 阻止默认右键菜单以便观察
            log('右键菜单被阻止（为了测试）');
        });
        
        // 初始日志
        log('F12测试页面已加载');
        checkTauri();
        
        // 添加手动打开开发者工具的按钮（如果可能）
        if (window.__TAURI__ && window.__TAURI__.webview) {
            const btn = document.createElement('button');
            btn.textContent = '通过Tauri API打开开发者工具';
            btn.onclick = async () => {
                try {
                    // 尝试使用Tauri API打开开发者工具
                    if (window.__TAURI__.webview.openDevTools) {
                        await window.__TAURI__.webview.openDevTools();
                        log('✅ 通过Tauri API打开开发者工具');
                    } else {
                        log('❌ Tauri API中没有openDevTools方法');
                    }
                } catch (error) {
                    log(`❌ 打开失败: ${error.message}`);
                }
            };
            document.body.appendChild(btn);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>MarkEdit 文件类型支持测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .pass { background: #d4edda; border-color: #c3e6cb; }
        .fail { background: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>MarkEdit 文件类型支持测试</h1>
    
    <div id="test-results">
        <p>正在加载测试...</p>
    </div>
    
    <script type="module">
        import { 
            getFileType, 
            isMarkdownFile, 
            getEditorMode, 
            getFileLanguage,
            getFileIcon,
            getAllFileTypes,
            getSupportedExtensions 
        } from './src/file-types.js';
        
        const tests = [];
        
        // 测试1: 基本文件类型检测
        function testFileTypes() {
            const testFiles = [
                { file: 'document.md', expected: 'Markdown' },
                { file: 'script.js', expected: 'JavaScript' },
                { file: 'style.css', expected: 'CSS' },
                { file: 'app.py', expected: 'Python' },
                { file: 'data.json', expected: 'JSON' },
                { file: 'config.yaml', expected: 'YAML' },
                { file: 'Dockerfile', expected: 'Dockerfile' },
                { file: 'Makefile', expected: 'Makefile' }
            ];
            
            let passed = 0;
            testFiles.forEach(({ file, expected }) => {
                const result = getFileType(file);
                const success = result.name === expected;
                if (success) passed++;
                
                tests.push({
                    name: `检测文件类型: ${file}`,
                    success,
                    details: `期望: ${expected}, 实际: ${result.name}`
                });
            });
            
            return { passed, total: testFiles.length };
        }
        
        // 测试2: Markdown 检测
        function testMarkdownDetection() {
            const testFiles = [
                { file: 'readme.md', expected: true },
                { file: 'script.js', expected: false },
                { file: 'notes.txt', expected: false },
                { file: 'document.markdown', expected: true }
            ];
            
            let passed = 0;
            testFiles.forEach(({ file, expected }) => {
                const result = isMarkdownFile(file);
                const success = result === expected;
                if (success) passed++;
                
                tests.push({
                    name: `检测 Markdown: ${file}`,
                    success,
                    details: `期望: ${expected ? '是' : '否'}, 实际: ${result ? '是' : '否'}`
                });
            });
            
            return { passed, total: testFiles.length };
        }
        
        // 测试3: 编辑器模式
        function testEditorModes() {
            const testFiles = [
                { file: 'readme.md', expected: 'markdown' },
                { file: 'script.js', expected: 'code' },
                { file: 'notes.txt', expected: 'plain' },
                { file: 'config.yaml', expected: 'code' }
            ];
            
            let passed = 0;
            testFiles.forEach(({ file, expected }) => {
                const result = getEditorMode(file);
                const success = result === expected;
                if (success) passed++;
                
                tests.push({
                    name: `编辑器模式: ${file}`,
                    success,
                    details: `期望: ${expected}, 实际: ${result}`
                });
            });
            
            return { passed, total: testFiles.length };
        }
        
        // 测试4: 文件图标
        function testFileIcons() {
            const testFiles = ['readme.md', 'script.js', 'style.css', 'app.py'];
            
            let passed = 0;
            testFiles.forEach(file => {
                const icon = getFileIcon(file);
                const success = icon && icon.length > 0;
                if (success) passed++;
                
                tests.push({
                    name: `文件图标: ${file}`,
                    success,
                    details: `图标: ${icon}`
                });
            });
            
            return { passed, total: testFiles.length };
        }
        
        // 运行所有测试
        function runAllTests() {
            const results = [
                testFileTypes(),
                testMarkdownDetection(),
                testEditorModes(),
                testFileIcons()
            ];
            
            const totalPassed = results.reduce((sum, r) => sum + r.passed, 0);
            const totalTests = results.reduce((sum, r) => sum + r.total, 0);
            
            // 显示结果
            const container = document.getElementById('test-results');
            let html = `<h2>测试结果: ${totalPassed}/${totalTests} 通过</h2>`;
            
            tests.forEach(test => {
                const className = test.success ? 'pass' : 'fail';
                html += `
                    <div class="test ${className}">
                        <h3>${test.name} - ${test.success ? '✅ 通过' : '❌ 失败'}</h3>
                        <p>${test.details}</p>
                    </div>
                `;
            });
            
            // 显示支持的扩展名
            const extensions = getSupportedExtensions();
            html += `
                <div class="test pass">
                    <h3>📊 支持的扩展名统计</h3>
                    <p>共支持 ${extensions.length} 种文件扩展名</p>
                    <pre>${extensions.join(', ')}</pre>
                </div>
            `;
            
            // 显示所有文件类型
            const allTypes = getAllFileTypes();
            html += `
                <div class="test pass">
                    <h3>📁 所有支持的文件类型</h3>
                    <ul>
                        ${allTypes.map(type => 
                            `<li>${type.icon} ${type.name}: ${type.extensions.join(', ')}</li>`
                        ).join('')}
                    </ul>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // 页面加载完成后运行测试
        document.addEventListener('DOMContentLoaded', runAllTests);
    </script>
</body>
</html>
